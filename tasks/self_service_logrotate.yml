---
- name: Ensure logrotate is installed
  ansible.builtin.package:
    name: logrotate
    state: present

- name: Install self-service logrotate policy for GitLab logs
  ansible.builtin.template:
    src: gitlab-self-service.logrotate.j2
    dest: /etc/logrotate.d/gitlab-self-service
    owner: root
    group: root
    mode: "0644"
