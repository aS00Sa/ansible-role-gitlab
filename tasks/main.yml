---
- name: Include OS-specific variables.
  include_vars: "{{ ansible_os_family }}.yml"

- name: Require gitlab_domain (задаётся вне роли — inventory, group_vars, -e)
  ansible.builtin.assert:
    that:
      - gitlab_domain | default('', true) | string | trim | length > 0
    fail_msg: >-
      Укажите gitlab_domain (FQDN), например в inventory у хоста или в group_vars.
      В defaults/main.yml значение пустое — без захардкоженного домена.

- name: Enforce system locale (ru_RU.UTF-8) and timezone (Europe/Moscow)
  ansible.builtin.include_tasks: locale.yml
  when: gitlab_enforce_system_locale | default(true) | bool

- name: Check if GitLab configuration file already exists.
  stat: path=/etc/gitlab/gitlab.rb
  register: gitlab_config_file

- name: Check if GitLab is already installed.
  stat: path=/usr/bin/gitlab-ctl
  register: gitlab_file

# Install GitLab and its dependencies.
- name: Install GitLab dependencies.
  package:
    name: "{{ gitlab_dependencies }}"
    state: present

- name: Install GitLab dependencies (Debian).
  apt:
    name: gnupg2
    state: present
  when: ansible_os_family == 'Debian'

- name: Create CI deploy system user (gitlab-ci)
  ansible.builtin.include_tasks: ci_deploy_user.yml
  when: gitlab_ci_deploy_user_enabled | default(true) | bool

- name: Download GitLab repository installation script.
  get_url:
    url: "{{ gitlab_repository_installation_script_url }}"
    dest: /tmp/gitlab_install_repository.sh
    validate_certs: "{{ gitlab_download_validate_certs }}"
  when: not gitlab_file.stat.exists

- name: Install GitLab repository.
  command: bash /tmp/gitlab_install_repository.sh
  register: output
  when: not gitlab_file.stat.exists

- name: Define the Gitlab package name.
  set_fact:
    gitlab_package_name: "{{ gitlab_edition }}{{ gitlab_package_version_separator }}{{ gitlab_version }}"
  when: (gitlab_version | default('') | length) > 0

- name: Install GitLab
  package:
    name: "{{ gitlab_package_name | default(gitlab_edition) }}"
    state: present
  async: 300
  poll: 5
  when: not gitlab_file.stat.exists

# Уже установленный Omnibus: подтянуть последнюю версию из репозитория (gitlab_version пустой) или пин (gitlab_version задан).
- name: Upgrade GitLab to latest from repository (Debian, no version pin)
  apt:
    name: "{{ gitlab_edition }}"
    state: latest
    update_cache: true
  async: 1800
  poll: 10
  notify: restart gitlab
  when:
    - gitlab_file.stat.exists | bool
    - ansible_os_family == 'Debian'
    - (gitlab_version | default('') | length) == 0

- name: Ensure GitLab matches pinned package version (Debian)
  apt:
    name: "{{ gitlab_package_name }}"
    state: present
    update_cache: true
  async: 1800
  poll: 10
  notify: restart gitlab
  when:
    - gitlab_file.stat.exists | bool
    - ansible_os_family == 'Debian'
    - (gitlab_version | default('') | length) > 0

- name: Upgrade GitLab to latest from repository (RedHat, no version pin)
  package:
    name: "{{ gitlab_edition }}"
    state: latest
  notify: restart gitlab
  when:
    - gitlab_file.stat.exists | bool
    - ansible_os_family == 'RedHat'
    - (gitlab_version | default('') | length) == 0

- name: Ensure GitLab matches pinned package version (RedHat)
  package:
    name: "{{ gitlab_package_name }}"
    state: present
  notify: restart gitlab
  when:
    - gitlab_file.stat.exists | bool
    - ansible_os_family == 'RedHat'
    - (gitlab_version | default('') | length) > 0

# Start and configure GitLab. Sometimes the first run fails, but after that,
# restarts fix problems, so ignore failures on this run.
- name: Reconfigure GitLab (first run).
  command: >
    gitlab-ctl reconfigure
    creates=/var/opt/gitlab/bootstrapped
  failed_when: false

- name: Create GitLab SSL configuration folder.
  file:
    path: /etc/gitlab/ssl
    state: directory
    owner: root
    group: root
    mode: 0700
  when: gitlab_create_self_signed_cert | bool or gitlab_deploy_pki_tls | default(false) | bool

- name: Deploy TLS from PKI (leaf + intermediate, без root CA на хосте)
  ansible.builtin.include_tasks: ssl_pki.yml
  when: gitlab_deploy_pki_tls | default(false) | bool

- name: Create self-signed certificate.
  command: >
    openssl req -new -nodes -x509 -subj "{{ gitlab_self_signed_cert_subj }}"
    -days 3650 -keyout {{ gitlab_ssl_certificate_key }} -out {{ gitlab_ssl_certificate }} -extensions v3_ca
    creates={{ gitlab_ssl_certificate }}
  when:
    - gitlab_create_self_signed_cert | bool
    - not (gitlab_deploy_pki_tls | default(false) | bool)

- name: Compute gitlab_rails allowed_hosts for gitlab.rb template
  ansible.builtin.include_tasks: allowed_hosts.yml

- name: Copy GitLab configuration file.
  template:
    src: "{{ gitlab_config_template }}"
    dest: /etc/gitlab/gitlab.rb
    owner: root
    group: root
    mode: 0600
  notify: restart gitlab

- name: Flush handlers before applying application settings
  meta: flush_handlers

- name: Enforce GitLab anti-lockout application settings
  command: >
    gitlab-rails runner
    "s = ApplicationSetting.current;
    updates = {};
    updates[:failed_authentication_ban_for_git_and_api_enabled] = false if s.respond_to?(:failed_authentication_ban_for_git_and_api_enabled) && s.failed_authentication_ban_for_git_and_api_enabled != false;
    updates[:max_login_attempts] = 99999 if s.respond_to?(:max_login_attempts) && s.max_login_attempts != 99999;
    updates[:failed_login_attempts_unlock_period_in_minutes] = 1 if s.respond_to?(:failed_login_attempts_unlock_period_in_minutes) && s.failed_login_attempts_unlock_period_in_minutes != 1;
    if updates.empty?;
      puts 'GitLab anti-lockout settings are already up to date';
    else
      s.update!(updates);
      puts \"Updated GitLab anti-lockout settings: #{updates.keys.join(', ')}\";
    end"
  register: gitlab_anti_lockout_settings
  changed_when: "'Updated GitLab anti-lockout settings:' in gitlab_anti_lockout_settings.stdout"

- name: Configure Web IDE feature flag (:vscode_web_ide)
  ansible.builtin.include_tasks: web_ide.yml
  when:
    - gitlab_web_ide_configure_feature_flag | default(true) | bool
    - gitlab_file.stat.exists | bool

- name: Configure self-service mechanisms
  ansible.builtin.include_tasks: self_service.yml
  when: gitlab_self_service_enabled | default(false) | bool
