[gitlab_servers]
# gitlab_domain — ваш FQDN (пример ниже замените на свой; не коммитьте прод в публичный репозиторий).
# Ключ: удобнее передавать в команде --private-key ~/.ssh/id_ed25519 (или id_rsa). Либо добавьте сюда:
#   ansible_ssh_private_key_file=~/.ssh/id_ed25519
gitlab-localdomain ansible_host=192.168.1.71 ansible_user=debian local_domain=localdomain gitlab_domain=gitlab.localdomain
